events {
  worker_connections 1024;
}

http {
  # Docker internal DNS resolves service names automatically
  upstream catalog_svc      { server catalog-service:3001; }
  upstream order_svc        { server order-service:3002;   }
  upstream query_svc        { server query-service:3005;   }

  server {
    listen 80;
    server_name _;

    # ── health ──────────────────────────────────────────────────────────────
    location = /health {
      default_type application/json;
      return 200 '{"status":"ok","gateway":"nginx"}';
    }

    # ── catalog-service REST ─────────────────────────────────────────────────
    location /api/catalog/ {
      proxy_pass         http://catalog_svc/;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Gateway         nginx-prod;
    }

    location /swagger/catalog/ {
      proxy_pass http://catalog_svc/api/;
      proxy_set_header Host $host;
    }

    # ── order-service REST ───────────────────────────────────────────────────
    location /api/orders/ {
      proxy_pass         http://order_svc/orders/;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Gateway         nginx-prod;
    }

    location /swagger/orders/ {
      proxy_pass http://order_svc/api/;
      proxy_set_header Host $host;
    }

    # ── query-service GraphQL ────────────────────────────────────────────────
    location /graphql {
      proxy_pass         http://query_svc/graphql;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade           $http_upgrade;
      proxy_set_header   Connection        "upgrade";
    }
  }
}
