name: CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Compute tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Generate tag
        id: tag
        run: |
          TAG="$(date -u +%Y%m%d-%H%M%S)-${GITHUB_SHA::7}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Tag: ${TAG}"

  build:
    name: ${{ matrix.service }}
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service:    catalog-service
            dockerfile: catalog-service/Dockerfile
            image:      tp-catalog-service
          - service:    order-service
            dockerfile: order-service/Dockerfile
            image:      tp-order-service
          - service:    stock-service
            dockerfile: stock-service/Dockerfile
            image:      tp-stock-service
          - service:    notification-service
            dockerfile: notification-service/Dockerfile
            image:      tp-notification-service
          - service:    query-service
            dockerfile: query-service/Dockerfile
            image:      tp-query-service
          - service:    dashboard
            dockerfile: dashboard/Dockerfile
            image:      tp-dashboard

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:${{ needs.prepare.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to:   type=gha,mode=max,scope=${{ matrix.service }}

  update-compose:
    name: Update docker-compose.prod.yml
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.ref }}

      - name: Patch image tags
        env:
          TAG:   ${{ needs.prepare.outputs.tag }}
          DUSER: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          for svc in catalog-service order-service stock-service notification-service query-service dashboard; do
            sed -i "s|image: .*/tp-${svc}:.*|image: ${DUSER}/tp-${svc}:${TAG}|g" docker-compose.prod.yml
          done
          grep "image:" docker-compose.prod.yml

      - name: Commit and push
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docker-compose.prod.yml
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(deploy): bump images to ${TAG} [skip ci]"
            git push
          fi
