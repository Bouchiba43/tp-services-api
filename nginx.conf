events {
  worker_connections 1024;
}

http {
  # host.docker.internal resolves to the Docker host (Linux: set via extra_hosts)
  upstream catalog_svc      { server host.docker.internal:3001; }
  upstream order_svc        { server host.docker.internal:3002; }
  upstream query_svc        { server host.docker.internal:3005; }

  server {
    listen 8080;
    server_name localhost;

    # ── health ──────────────────────────────────────────────────────────────
    location = /health {
      default_type application/json;
      return 200 '{"status":"ok","gateway":"nginx","ts":"$time_iso8601"}';
    }

    # ── catalog-service REST ─────────────────────────────────────────────────
    # /api/catalog/products → catalog-service /products
    location /api/catalog/ {
      proxy_pass         http://catalog_svc/;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Gateway         nginx;
    }

    # Swagger UI
    location /swagger/catalog {
      proxy_pass http://catalog_svc/api;
      proxy_set_header Host $host;
    }

    # ── order-service REST ───────────────────────────────────────────────────
    location /api/orders/ {
      proxy_pass         http://order_svc/orders/;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Gateway         nginx;
    }

    location /swagger/orders {
      proxy_pass http://order_svc/api;
      proxy_set_header Host $host;
    }

    # ── query-service GraphQL ────────────────────────────────────────────────
    location /graphql {
      proxy_pass         http://query_svc/graphql;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade           $http_upgrade;
      proxy_set_header   Connection        "upgrade";
    }
  }
}
